name: Actualizar marcador en vivo (API-Football)

# Solo gasta cuota cuando hay un partido del Mundial en ventana de juego
# (la lógica está en scripts/fetch-live.mjs). La clave va en Secrets, nunca en el código.
on:
  schedule:
    - cron: '*/5 * * * *'    # cada 5 min (mínimo permitido por GitHub)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: data-live
  cancel-in-progress: true

jobs:
  live:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Generar data en vivo
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: node scripts/fetch-live.mjs
      # El marcador se publica en la rama `live-data` (NO en main), para que los
      # cambios cada 5 min no disparen un redespliegue de GitHub Pages (que se
      # topaba con el límite de despliegues). Es un orphan con force-push: la rama
      # queda siempre en 1 commit, sin crecer el historial. El frontend lee ese
      # fichero directo desde raw.githubusercontent.
      - name: Publicar live.json en la rama live-data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git diff --quiet -- data/live.json; then
            echo "Sin cambios en live."
            exit 0
          fi
          tmp="$(mktemp -d)"
          cp data/live.json "$tmp/live.json"
          cd "$tmp"
          git init -q
          git config user.name "mundialapp-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -q -b live-data
          git add live.json
          git commit -q -m "live: $(date -u +'%Y-%m-%dT%H:%MZ')"
          git push -q --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" live-data
          echo "Publicado en live-data."
