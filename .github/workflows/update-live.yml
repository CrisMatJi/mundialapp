name: Actualizar marcador en vivo (API-Football)

# Solo gasta cuota cuando hay un partido del Mundial en ventana de juego
# (la lógica está en scripts/fetch-live.mjs). La clave va en Secrets, nunca en el código.
on:
  schedule:
    - cron: '*/5 * * * *'    # cada 5 min (mínimo permitido por GitHub)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: data-live
  cancel-in-progress: true

jobs:
  live:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Generar data en vivo
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: node scripts/fetch-live.mjs
      - name: Commit si hay cambios
        run: |
          git config user.name "mundialapp-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/live.json
          if git diff --staged --quiet; then
            echo "Sin cambios en live."
          else
            git commit -m "data(live): $(date -u +'%Y-%m-%dT%H:%MZ')"
            git push
          fi
